<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      alias: {
        './_sidebar.md': './_sidebar.md',
      },
      // 开启封面 
      coverpage: true,
      onlyCover: true,
      name: 'Wuzhou Sun',
      repo: '',
      loadSidebar: true, // 使用_sidebar.md组装多页面网站
      subMaxLevel: 2,
      relativePath: true, // 使用相对路径链接
      topMargin: 90,
      search: {
        paths: 'auto',
        hideOtherSidebarContent: true,
        placeholder: '🔍 search',
        noData: '😒 not find',
        // Headline depth, 1 - 6
        depth: 6,
        maxAge: 86400000, // 过期时间，单位毫秒，默认一天
      },
      // mergeNavbar: true,
      auto2top: true,
      // routerMode: 'history',
      pagination: {
        previousText: 'PREVIOUS',
        // or
        nextText: {
          '/en/': 'NEXT',
          '/': 'NEXT'
        },
        crossChapter: true,
        crossChapterText: true,
      },
      loadNavbar: true,

      // 加载 nav.md
      // loadNavbar: 'nav.md',
    }
  </script>
